<div style="display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0;">
    <div>
        <a href="{% url 'MainApp:index' %}">Learning Log</a>
        {% if user.is_authenticated %}
            <a href="{% url 'MainApp:topics' %}" style="margin-left: 15px;">Topics</a>
        {% endif %}
    </div>

    <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end;">
        {% if user.is_authenticated %}
            <span>Hello, {{ user.username }}</span>
            <form action="{% url 'users:logout' %}" method="post" style="margin: 0;">
                {% csrf_token %}
                <button type="submit" style="background:none; border:none; color:blue; text-decoration:underline; cursor:pointer; padding:0; font-family: inherit; font-size: inherit;">
                    Log out
                </button>
            </form>
        {% else %}
        <a href="{% url 'users:register' %}" style="margin-left: 15px;">
            Register
        </a>
        <a href="{% url 'users:login' %}" style="margin-left: 15px;">
            Log in
        </a>
        {% endif %}
    </div>
</div>

<hr>

{% block content %}
{% endblock content %}
